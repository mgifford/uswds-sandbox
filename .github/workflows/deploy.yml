name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Initialize USWDS assets
        run: npm run init

      - name: Compile Sass to CSS
        run: npm run uswds:buildSass

      - name: Build site
        run: npm run build
        env:
          BASEURL: /uswds-sandbox/

      - name: Verify build output
        run: |
          echo "=== Checking build output ==="
          ls -la _site/assets/css/ || echo "No CSS in _site"
          ls -la _site/assets/js/ || echo "No JS in _site"

      - name: Run accessibility tests
        run: npx playwright test --project=desktop
        continue-on-error: true

      - name: Generate accessibility report
        if: always()
        run: node scripts/generate-accessibility-report.js

      - name: Rebuild site with report
        run: |
          npm run uswds:buildSass
          npm run build
        env:
          BASEURL: /uswds-sandbox/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "_site"

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4