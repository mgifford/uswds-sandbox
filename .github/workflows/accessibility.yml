name: Accessibility Testing

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "24"
  BASEURL: /uswds-sandbox/

jobs:
  test:
    name: Build and test accessibility
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Initialize USWDS assets
        run: npm run init

      - name: Compile Sass to CSS
        run: npm run uswds:buildSass

      # Playwright starts the Eleventy web server defined in
      # playwright.config.js. That configuration builds the site before
      # starting the server, so another build is not needed here.
      - name: Run accessibility tests
        run: npx playwright test --project=desktop

      - name: Generate accessibility report
        if: always()
        run: node scripts/generate-accessibility-report.js

      # Rebuild after generating the JSON report so that the published
      # Eleventy site includes the latest accessibility results.
      - name: Build site with accessibility report
        if: always()
        run: npm run build

      - name: Upload accessibility report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: accessibility-report
          path: |
            test-results/
            src/_data/accessibility-report.json
          retention-days: 30
          if-no-files-found: warn

      - name: Upload site with report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: site-with-report
          path: _site/
          retention-days: 7
          if-no-files-found: warn

      - name: Upload GitHub Pages artifact
        if: >
          github.ref == 'refs/heads/main' &&
          github.event_name == 'push'
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Comment on failed pull request
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('node:fs');

            const reportPath = 'src/_data/accessibility-report.json';

            if (!fs.existsSync(reportPath)) {
              core.warning(
                `Accessibility report was not found at ${reportPath}.`
              );
              return;
            }

            const report = JSON.parse(
              fs.readFileSync(reportPath, 'utf8')
            );

            const summary = report.summary ?? {};
            const suites = report.suites ?? [];

            let comment = '## Accessibility Test Results\n\n';
            comment += `❌ **${summary.failed ?? 0}** test(s) failed `;
            comment += `out of **${summary.totalTests ?? 0}** total tests.\n\n`;
            comment += '### Failed Tests\n\n';

            let failedTestsFound = false;

            for (const suite of suites) {
              for (const test of suite.tests ?? []) {
                if (test.status !== 'failed') {
                  continue;
                }

                failedTestsFound = true;
                comment += `- **${test.name}** (${suite.name})\n`;

                for (const error of test.errors ?? []) {
                  const normalizedError = String(error)
                    .replace(/\s+/g, ' ')
                    .trim()
                    .substring(0, 200);

                  comment += `  - ${normalizedError}\n`;
                }
              }
            }

            if (!failedTestsFound) {
              comment += '- The workflow failed before failed test details were available.\n';
            }

            comment += '\nPlease fix these accessibility issues before merging.';

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

  deploy:
    name: Deploy accessibility report
    if: >
      github.ref == 'refs/heads/main' &&
      github.event_name == 'push'
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
