```yaml
name: Lighthouse CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "24"
  BASEURL: /uswds-sandbox/

jobs:
  lighthouse:
    name: Build and test with Lighthouse
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Initialize USWDS assets
        run: npm run init

      - name: Compile Sass to CSS
        run: npm run uswds:buildSass

      - name: Build site
        run: npm run build

      # lighthouserc.json uses staticDistDir: ./_site and defines the
      # routes to scan. Lighthouse therefore tests this commit's build,
      # including pull request changes, rather than the deployed site.
      - name: Run Lighthouse CI
        id: lighthouse
        uses: treosh/lighthouse-ci-action@v12
        with:
          configPath: ./lighthouserc.json
          uploadArtifacts: true
          temporaryPublicStorage: true

      - name: Generate Lighthouse summary
        if: always()
        env:
          COMMIT_TIMESTAMP: ${{ github.event.head_commit.timestamp }}
          LIGHTHOUSE_STATUS: ${{ steps.lighthouse.outcome }}
        run: |
          node <<'EOF'
          import fs from 'node:fs';

          const timestamp =
            process.env.COMMIT_TIMESTAMP ||
            new Date().toISOString();

          const report = {
            timestamp,
            status: process.env.LIGHTHOUSE_STATUS || 'unknown',
            urls: [
              {
                url: '/',
                category: 'Homepage'
              },
              {
                url: '/components/',
                category: 'Components'
              },
              {
                url: '/components/button/',
                category: 'Component'
              },
              {
                url: '/components/card/',
                category: 'Component'
              },
              {
                url: '/components/form/',
                category: 'Component'
              },
              {
                url: '/templates/',
                category: 'Templates'
              },
              {
                url: '/templates/landing/',
                category: 'Template'
              },
              {
                url: '/templates/forms/',
                category: 'Template'
              },
              {
                url: '/patterns/',
                category: 'Patterns'
              }
            ]
          };

          fs.mkdirSync('src/_data', { recursive: true });
          fs.writeFileSync(
            'src/_data/lighthouse-report.json',
            `${JSON.stringify(report, null, 2)}\n`
          );
          EOF

      - name: Upload Lighthouse results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-results
          path: |
            .lighthouseci/
            src/_data/lighthouse-report.json
          retention-days: 30
          if-no-files-found: warn
```
